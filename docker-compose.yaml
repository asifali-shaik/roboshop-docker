services:
  mongodb:
   build: ./MONGODB # moves into the mongodb directory 
   image: shaikaliasif/mongodb:1.0.0 # this will build the images instead of this command docker build -t <name> 
   container_name: mongodb

  catalogue:
    build: ./CATALOGUE
    image: shaikaliasif/catalogue:1.0.0 
    container_name: catalogue
    depends_on:
      - mongodb 

  user:
    build: ./USER
    image: shaikaliasif/user:1.0.0
    container_name: user   
    depends_on:
      - redis
      - mongodb 
  mysql:
    build: ./MYSQL
    image: shaikaliasif/mysql:1.0.0
    container_name: mysql 
  frontend:
    build: ./FRONTEND
    image: shaikaliasif/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment

  redis: 
    image: redis:7.0
    container_name: redis 

  cart: 
    build: ./CART
    image: shaikaliasif/cart:1.0.0
    container_name: cart
    depends_on:
      - redis
      - catalogue

  shipping:
    build: ./shipping
    image: shaikaliasif/shipping:1.0.0
    container_name: shipping
    depends_on:
      - cart
      - mysql 

  payment:
    build: ./payment
    image: shaikaliasif/payment:1.0.0 
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: roboshop
      AMQP_PASS: roboshop123
    depends_on:
      - rabbitmq
      - user
      - cart 

  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
      container_name: rabbitmq 



networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true you need to create the network manually in your terminal 
      